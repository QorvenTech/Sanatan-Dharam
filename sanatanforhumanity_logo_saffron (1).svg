<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bgSaffron" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0800"/>
      <stop offset="60%" style="stop-color:#120500"/>
      <stop offset="100%" style="stop-color:#080200"/>
    </radialGradient>

    <linearGradient id="saffronOm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFDE0"/>
      <stop offset="25%" style="stop-color:#FFD000"/>
      <stop offset="55%" style="stop-color:#FF7B00"/>
      <stop offset="80%" style="stop-color:#E84500"/>
      <stop offset="100%" style="stop-color:#BF2000"/>
    </linearGradient>

    <linearGradient id="ringKesari" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="50%" style="stop-color:#FF5722"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>

    <linearGradient id="textKesari" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFCCBC"/>
      <stop offset="50%" style="stop-color:#FFAB76"/>
      <stop offset="100%" style="stop-color:#FF8A50"/>
    </linearGradient>

    <!-- Warm saffron glow -->
    <filter id="saffronGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Flicker/halo around Om -->
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FF3300;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Dark warm background -->
  <circle cx="250" cy="250" r="245" fill="url(#bgSaffron)"/>

  <!-- Warm halo behind Om -->
  <circle cx="250" cy="225" r="140" fill="url(#haloGrad)"/>

  <!-- Outermost thick ring -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="url(#ringKesari)" stroke-width="4"/>

  <!-- Dashed decorative ring -->
  <circle cx="250" cy="250" r="228" fill="none" stroke="#FF7000" stroke-width="1" stroke-dasharray="7,5" opacity="0.65"/>

  <!-- Inner thin ring -->
  <circle cx="250" cy="250" r="196" fill="none" stroke="#FF5722" stroke-width="1" opacity="0.3"/>
  <circle cx="250" cy="250" r="190" fill="none" stroke="#FF8C00" stroke-width="0.5" opacity="0.2"/>

  <!-- 8 Lotus petals - saffron tone -->
  <g opacity="0.28">
    <ellipse cx="250" cy="110" rx="13" ry="36" fill="#FF7000"/>
    <ellipse cx="250" cy="110" rx="13" ry="36" fill="#FF7000" transform="rotate(45,250,250)"/>
    <ellipse cx="250" cy="110" rx="13" ry="36" fill="#FF7000" transform="rotate(90,250,250)"/>
    <ellipse cx="250" cy="110" rx="13" ry="36" fill="#FF7000" transform="rotate(135,250,250)"/>
    <ellipse cx="250" cy="110" rx="13" ry="36" fill="#FF7000" transform="rotate(180,250,250)"/>
    <ellipse cx="250" cy="110" rx="13" ry="36" fill="#FF7000" transform="rotate(225,250,250)"/>
    <ellipse cx="250" cy="110" rx="13" ry="36" fill="#FF7000" transform="rotate(270,250,250)"/>
    <ellipse cx="250" cy="110" rx="13" ry="36" fill="#FF7000" transform="rotate(315,250,250)"/>
  </g>

  <!-- OM symbol — full saffron gradient with strong glow -->
  <text
    x="250"
    y="272"
    text-anchor="middle"
    font-family="serif"
    font-size="162"
    font-weight="bold"
    fill="url(#saffronOm)"
    filter="url(#saffronGlow)"
  >ॐ</text>

  <!-- Divider line -->
  <line x1="108" y1="320" x2="392" y2="320" stroke="#FF6D00" stroke-width="1.5" opacity="0.75"/>
  <!-- Diamond center -->
  <polygon points="250,314 257,320 250,326 243,320" fill="#FFD000" opacity="0.95"/>
  <!-- Small side dots on line -->
  <circle cx="130" cy="320" r="2" fill="#FF7000" opacity="0.6"/>
  <circle cx="370" cy="320" r="2" fill="#FF7000" opacity="0.6"/>

  <!-- Site name -->
  <text
    x="250"
    y="352"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21.5"
    letter-spacing="3.5"
    fill="url(#textKesari)"
    filter="url(#softGlow)"
  >SANATAN FOR HUMANITY</text>

  <!-- Hindi tagline -->
  <text
    x="250"
    y="380"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="13"
    letter-spacing="2"
    fill="#FF8A50"
    opacity="0.88"
  >पवित्र ग्रंथ • मंत्र • आध्यात्मिक ज्ञान</text>

  <!-- Bottom decorative line -->
  <line x1="128" y1="397" x2="372" y2="397" stroke="#FF5722" stroke-width="0.8" opacity="0.45"/>

  <!-- Cardinal dots -->
  <circle cx="250" cy="11"  r="4.5" fill="#FFD000" opacity="0.85"/>
  <circle cx="250" cy="489" r="4.5" fill="#FFD000" opacity="0.85"/>
  <circle cx="11"  cy="250" r="4.5" fill="#FFD000" opacity="0.85"/>
  <circle cx="489" cy="250" r="4.5" fill="#FFD000" opacity="0.85"/>

  <!-- Diagonal accent dots -->
  <circle cx="84"  cy="84"  r="3" fill="#FF7000" opacity="0.5"/>
  <circle cx="416" cy="84"  r="3" fill="#FF7000" opacity="0.5"/>
  <circle cx="84"  cy="416" r="3" fill="#FF7000" opacity="0.5"/>
  <circle cx="416" cy="416" r="3" fill="#FF7000" opacity="0.5"/>

  <!-- Tiny leaf accents at top/bottom of inner ring -->
  <ellipse cx="250" cy="55" rx="5" ry="11" fill="#FF6D00" opacity="0.3"/>
  <ellipse cx="250" cy="55" rx="5" ry="11" fill="#FF6D00" opacity="0.3" transform="rotate(90,250,250)"/>
  <ellipse cx="250" cy="55" rx="5" ry="11" fill="#FF6D00" opacity="0.3" transform="rotate(180,250,250)"/>
  <ellipse cx="250" cy="55" rx="5" ry="11" fill="#FF6D00" opacity="0.3" transform="rotate(270,250,250)"/>
</svg>
